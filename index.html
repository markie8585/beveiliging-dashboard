<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beveiliging Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* overlay voor leesbaarheid */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
}

/* topbar */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.85);
    border-bottom: 2px solid #222;
    font-size: 18px;
}

/* meldingen balk */
.alertbar {
    background: #8b0000;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* grid layout */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
}

/* cards */
.card {
    background: rgba(20,20,20,0.9);
    border-radius: 14px;
    padding: 15px;
}

/* knoppen */
button {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #2a2a2a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #444;
    transform: scale(1.03);
}

button:active {
    transform: scale(0.98);
}

.alert {
    background: #b30000;
}

/* footer */
.footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #aaa;
}
</style>

<script>
function openLink(url, newWindow=false) {
    if(newWindow){
        window.open(url, '_blank');
    } else {
        window.location.href = url;
    }
}

/* klok */
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

/* meldingen simulatie */
let alerts = [
    "Geen actieve meldingen",
    "Brandmelding OK afdeling",
    "Deuralarm SEH ingang"
];

function updateAlert(){
    let random = alerts[Math.floor(Math.random()*alerts.length)];
    document.getElementById("alert").innerText = random;
}
setInterval(updateAlert, 5000);

/* sneltoetsen */
document.addEventListener("keydown", function(e){
    switch(e.key){
        case "1": openLink("LINK_CAMERA", true); break;
        case "2": openLink("LINK_HIX"); break;
        case "3": openLink("LINK_MAIL"); break;
        case "4": openLink("LINK_LOGBOEK"); break;
    }
});
</script>

</head>

<body onload="updateClock()">
<div class="overlay">

<!-- TOP -->
<div class="topbar">
    <div>🔒 Beveiliging Loge</div>
    <div id="clock"></div>
</div>

<!-- MELDINGEN -->
<div class="alertbar" id="alert">
Geen actieve meldingen
</div>

<!-- GRID -->
<div class="grid">

<!-- RAPPORTAGE -->
<div class="card">
<h2>📄 Rapportage</h2>
<button onclick="openLink('LINK_DIENSTRAPPORT')">Dienstrapport</button>
<button onclick="openLink('LINK_RAPPORTEN')">Rapporten map</button>
<button onclick="openLink('LINK_LOGBOEK')">Logboek</button>
</div>

<!-- BEVEILIGING -->
<div class="card">
<h2>📹 Beveiliging</h2>
<button class="alert" onclick="openLink('LINK_CAMERA', true)">Camerabeelden</button>
<button onclick="openLink('LINK_BEWEGING')">Bewegingsmelder</button>
<button onclick="openLink('LINK_EFRIS')">EFRIS Siemens</button>
<button onclick="openLink('LINK_PNEUMAN')">Pneuman</button>
</div>

<!-- SYSTEMEN -->
<div class="card">
<h2>🏥 Systemen</h2>
<button onclick="openLink('LINK_HIX')">HIX</button>
<button onclick="openLink('LINK_ULTIMO')">Ultimo</button>
<button onclick="openLink('LINK_OK')">OK-oproep</button>
</div>

<!-- LOGISTIEK -->
<div class="card">
<h2>📦 Logistiek</h2>
<button onclick="openLink('LINK_MAGAZIJN')">Magazijn</button>
<button onclick="openLink('LINK_LOCKERS')">Lockers</button>
</div>

<!-- OVERIG -->
<div class="card">
<h2>📑 Overig</h2>
<button onclick="openLink('LINK_MAIL')">Mailbox</button>
<button onclick="openLink('LINK_KOELKAST')">Koelkast temperatuur</button>
<button onclick="openLink('LINK_GEVONDEN')">Gevonden voorwerpen</button>
<button onclick="openLink('LINK_SLEUTELS')">Sleutellijst</button>
<button onclick="openLink('LINK_BEREIKBAARHEID')">Bereikbaarheid</button>
</div>

</div>

<div class="footer">
Sneltoetsen: 1 = Camera | 2 = HIX | 3 = Mail | 4 = Logboek
</div>

</div>
</body>
</html>
