<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beveiliging Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* overlay voor leesbaarheid */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
}

/* topbar */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.8);
    border-bottom: 2px solid #222;
}

/* meldingen banner */
.alertbar {
    background: #8b0000;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
}

/* cards */
.card {
    background: rgba(20,20,20,0.9);
    border-radius: 14px;
    padding: 15px;
}

/* knoppen */
button {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #2a2a2a;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #444;
    transform: scale(1.03);
}

.alert {
    background: #b30000;
}
</style>

<script>
function openLink(url, newWindow=false) {
    if(newWindow){
        window.open(url, '_blank');
    } else {
        window.location.href = url;
    }
}

/* klok */
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

/* meldingen (simulatie) */
let alerts = [
    "Geen actieve meldingen",
    "Brandmelding OK afdeling",
    "Deuralarm SEH ingang"
];

function updateAlert(){
    let random = alerts[Math.floor(Math.random()*alerts.length)];
    document.getElementById("alert").innerText = random;
}
setInterval(updateAlert, 5000);
</script>

</head>

<body onload="updateClock()">
<div class="overlay">

<div class="topbar">
    <div>🔒 Beveiliging Loge</div>
    <div id="clock"></div>
</div>

<div class="alertbar" id="alert">
Geen actieve meldingen
</div>

<div class="grid">

<div class="card">
<h2>📄 Rapportage</h2>
<button onclick="openLink('LINK')">Dienstrapport</button>
<button onclick="openLink('LINK')">Rapporten</button>
<button onclick="openLink('LINK')">Logboek</button>
</div>

<div class="card">
<h2>📹 Beveiliging</h2>
<button class="alert" onclick="openLink('LINK', true)">Camerabeelden</button>
<button onclick="openLink('LINK')">Bewegingsmelder</button>
<button onclick="openLink('LINK')">EFRIS</button>
<button onclick="openLink('LINK')">Pneuman</button>
</div>

<div class="card">
<h2>🏥 Systemen</h2>
<button onclick="openLink('LINK')">HIX</button>
<button onclick="openLink('LINK')">Ultimo</button>
<button onclick="openLink('LINK')">OK-oproep</button>
</div>

<div class="card">
<h2>📦 Logistiek</h2>
<button onclick="openLink('LINK')">Magazijn</button>
<button onclick="openLink('LINK')">Lockers</button>
</div>

<div class="card">
<h2>📑 Overig</h2>
<button onclick="openLink('LINK')">Mailbox</button>
<button onclick="openLink('LINK')">Koelkast</button>
<button onclick="openLink('LINK')">Sleutels</button>
<button onclick="openLink('LINK')">Bereikbaarheid</button>
</div>

</div>
</div>
</body>
</html>
